<title>rules_set</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #1f6feb;
  --green: #3fb950;
  --folder: #e3b341;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans SC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
}
.logo span { color: var(--accent); }

.sync-info {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Layout ── */
main {
  max-width: 960px;
  width: 100%;
  margin: 32px auto;
  padding: 0 24px;
  flex: 1;
}

/* ── Breadcrumb ── */
.breadcrumb {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.breadcrumb .crumb {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}
.breadcrumb .crumb:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--border); margin: 0 2px; }
.breadcrumb .current { color: var(--text); }

/* ── File list ── */
.file-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.file-box-header {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text2);
  font-family: var(--mono);
  display: flex;
  justify-content: space-between;
}
.file-row {
  display: grid;
  grid-template-columns: 26px 1fr 90px;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  cursor: pointer;
}
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: var(--bg3); }
.file-row .icon { font-size: 15px; text-align: center; }
.file-row .name {
  font-size: 14px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-row .name:hover { color: var(--accent); }
.file-row .size {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  text-align: right;
}
.back-row .name { color: var(--text2); }

/* ── Syncing overlay ── */
.syncing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,17,23,.92);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.syncing-overlay.active { display: flex; }
.syncing-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 40px 52px;
  text-align: center;
  min-width: 280px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.syncing-card h2 {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.syncing-card p {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <span class="logo" onclick="navigate('')">rules<span>_set</span></span>
  <div class="sync-info">
    <div class="dot"></div>
    <span id="last-update">加载中...</span>
  </div>
</header>

<main>
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- 目录列表 -->
  <div class="file-box" id="dir-view"></div>

</main>

<!-- 同步中覆盖层 -->
<div class="syncing-overlay" id="syncing-overlay">
  <div class="syncing-card">
    <div class="spinner"></div>
    <h2>文件正在同步中</h2>
    <p>请稍候，同步完成后<br>页面将自动刷新。</p>
  </div>
</div>

<script>
let currentPath = '';   // 当前目录路径（相对于根，不含前后斜杠）

// ── 最后同步时间 ──
async function fetchLastUpdate() {
  try {
    const r = await fetch('/__last_update__', {cache:'no-store'});
    if (r.ok) {
      const t = await r.text();
      if (t.trim()) {
        document.getElementById('last-update').textContent = '最后同步：' + t.trim();
      } else {
        document.getElementById('last-update').textContent = '未同步';
      }
    }
  } catch(e) {
    document.getElementById('last-update').textContent = '最后同步：未知';
  }
}
fetchLastUpdate();

// ── 同步状态轮询 ──
// /__syncing__ 文件存在(200) → 同步中；404 → 已完成
function checkSyncing() {
  fetch('/__syncing__', {cache:'no-store'})
    .then(r => {
      if (r.ok) {
        // 同步中：显示覆盖层，2秒后再查
        document.getElementById('syncing-overlay').classList.add('active');
        setTimeout(checkSyncing, 2000);
      } else {
        // 同步完成：隐藏覆盖层
        const overlay = document.getElementById('syncing-overlay');
        if (overlay.classList.contains('active')) {
          // 之前是同步中，现在完成了，刷新数据
          overlay.classList.remove('active');
          fetchLastUpdate();
          navigate(currentPath);
        }
        // 正常情况下每 5 秒检查一次，防止 cron 触发的同步无感知
        setTimeout(checkSyncing, 5000);
      }
    })
    .catch(() => setTimeout(checkSyncing, 5000));
}
checkSyncing();

// ── 面包屑 ──
function renderBreadcrumb(path) {
  const parts = path ? path.split('/') : [];
  let html = '<span class="crumb" onclick="navigate(\'\')">root</span>';
  let acc = '';
  parts.forEach((p, i) => {
    acc += (acc ? '/' : '') + p;
    const a = acc;
    html += '<span class="sep">/</span>';
    html += `<span class="crumb" onclick="navigate('${a}')">${p}</span>`;
  });
  document.getElementById('breadcrumb').innerHTML = html;
}

// ── 目录加载 ──
async function navigate(path) {
  currentPath = path;

  renderBreadcrumb(path);

  const apiPath = '/__api__/' + (path ? path + '/' : '');
  document.getElementById('dir-view').textContent = '加载中...';

  try {
    const r = await fetch(apiPath, {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const entries = await r.json();

    const dirs  = entries.filter(e => e.type === 'directory').sort((a,b) => a.name.localeCompare(b.name));
    const files = entries.filter(e => e.type === 'file').sort((a,b) => a.name.localeCompare(b.name));

    let rows = '';

    // 返回上级
    if (path) {
      const parent = path.includes('/') ? path.slice(0, path.lastIndexOf('/')) : '';
      rows += `<div class="file-row back-row" onclick="navigate('${parent}')">
        <div class="icon">📂</div>
        <div class="name">..</div>
        <div class="size">—</div>
      </div>`;
    }

    dirs.forEach(e => {
      const child = path ? path + '/' + e.name : e.name;
      rows += `<div class="file-row" onclick="navigate('${child}')">
        <div class="icon" style="color:var(--folder)">📁</div>
        <div class="name">${e.name}</div>
        <div class="size">—</div>
      </div>`;
    });

    files.forEach(e => {
      const filePath = path ? path + '/' + e.name : e.name;
      rows += `<div class="file-row" onclick="openFile('${filePath}')">
        <div class="icon">📄</div>
        <div class="name">${e.name}</div>
        <div class="size">${e.size < 1024 ? e.size + ' B' : e.size < 1048576 ? (e.size/1024).toFixed(1) + ' KB' : (e.size/1048576).toFixed(1) + ' MB'}</div>
      </div>`;
    });

    const total = `${dirs.length} 个目录，${files.length} 个文件`;
    document.getElementById('dir-view').innerHTML = `
      <div class="file-box-header">
        <span>/${path || ''}</span>
        <span>${total}</span>
      </div>
      ${rows}`;

  } catch(e) {
    document.getElementById('dir-view').textContent = '加载失败：' + e.message;
  }
}

// ── 文件：直接跳转原始 URL ──
function openFile(filePath) {
  window.location.href = '/' + filePath;
}

// 初始化
navigate('');
</script>
</body>
</html>
