{{define "update_login.html"}}<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — FilesManager</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#f6f8fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:32px;width:320px}
  .logo{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:24px;font-size:16px;font-weight:600;color:#1f2328}
  label{display:block;font-size:13px;font-weight:600;color:#1f2328;margin-bottom:6px}
  input{width:100%;padding:7px 12px;border:1px solid #d0d7de;border-radius:6px;font-size:14px;outline:none;transition:border-color .1s}
  input:focus{border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.1)}
  .field{margin-bottom:16px}
  .btn{width:100%;padding:8px;background:#0969da;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:background .1s}
  .btn:hover{background:#0550ae}
  .err{background:#ffebe9;border:1px solid #ff8182;border-radius:6px;padding:8px 12px;font-size:13px;color:#cf222e;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 16 16" fill="#0969da"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/></svg>
    FilesManager 管理
  </div>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <form method="POST" action="/update">
    <div class="field">
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password">
    </div>
    <button class="btn" type="submit">登录</button>
  </form>
</div>
</body>
</html>{{end}}
